<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="RyaanCMS — Free & open source AI-native CMS. Schema Architect, Plugin Marketplace, Visual Builder, and AI engine. Where WordPress, Lovable & Bolt failed." />
    <title>RyaanCMS — AI-Native CMS Platform</title>
    <meta property="og:title" content="RyaanCMS — AI-Native CMS Platform" />
    <meta property="og:description" content="Free & open source AI-native CMS with Schema Architect, Plugin Marketplace, and AI Builder." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <script>
      // Synchronously apply cached theme to prevent dark/light flash
      try {
        var t = localStorage.getItem("ryaan-theme");
        if (t === "dark") document.documentElement.classList.add("dark");
        else document.documentElement.classList.remove("dark");
      } catch(e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
